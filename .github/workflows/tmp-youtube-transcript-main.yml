name: Temporary YouTube transcript splitter

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  split:
    if: contains(github.event.head_commit.message, 'temporary YouTube extraction trigger')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp-youtube-transcript-8q6uybylrqw
      - name: Split transcript into readable chunks
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json,re
          root=Path('tmp/youtube-extraction-8Q6uYBylRqw')
          text=(root/'transcript.txt').read_text(encoding='utf-8')
          out=root/'chunks'
          if out.exists():
              for p in out.glob('*'): p.unlink()
          out.mkdir(exist_ok=True)
          # Split on sentence boundaries, keeping each file below about 3200 chars.
          sentences=re.split(r'(?<=[.!?])\s+',text)
          chunks=[]; current=''
          for s in sentences:
              if not s: continue
              if len(current)+len(s)+1>3200 and current:
                  chunks.append(current.strip()); current=s
              else:
                  current=(current+' '+s).strip()
          if current: chunks.append(current.strip())
          index=[]
          for i,ch in enumerate(chunks,1):
              p=out/f'part-{i:02d}.txt'
              p.write_text(ch,encoding='utf-8')
              index.append({'part':i,'file':str(p),'chars':len(ch),'preview':ch[:160]})
          (root/'chunk_index.json').write_text(json.dumps(index,ensure_ascii=False,indent=2),encoding='utf-8')
          print('chunks',len(chunks),'chars',len(text))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp/youtube-extraction-8Q6uYBylRqw/chunks tmp/youtube-extraction-8Q6uYBylRqw/chunk_index.json
          git commit -m "chore: split temporary YouTube transcript [skip ci]" || exit 0
          git push origin HEAD:tmp-youtube-transcript-8q6uybylrqw
